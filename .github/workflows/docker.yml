name: build-docker

on:
  push:
    branches: [main]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: build image
        run: docker build -t ${{ vars.DOCKER_USER}}/astro-blog:latest .

      - name: push image
        run: docker push ${{vars.DOCKER_USER}}/astro-blog:latest
